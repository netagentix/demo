<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bag Collector OS — Multi-Agent Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c10;
            --panel: rgba(16, 20, 28, 0.95);
            --border: rgba(255,255,255,0.05);
            --accent: #0ea5e9;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --text: #f8fafc;
            --dim: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Outfit', sans-serif;
            height: 100vh; display: flex; overflow: hidden;
        }

        #left-panel {
            width: 320px; background: var(--panel);
            border-right: 1px solid var(--border);
            padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem;
            overflow-y: auto; z-index: 10;
        }

        #canvas-wrap {
            flex: 1; display: flex; align-items: center; justify-content: center;
            background: #0f141c;
            position: relative;
        }
        
        canvas#sim-canvas { width: 100%; height: 100%; }

        h1 { font-size: 1.4rem; font-weight: 700; color: #fff; letter-spacing: -0.02em; }
        .sub { font-size: 0.75rem; color: var(--dim); margin-top: 2px; }

        .section-label {
            font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.15em;
            color: var(--dim); border-bottom: 1px solid var(--border);
            padding-bottom: 0.3rem; margin-bottom: 0.5rem;
            margin-top: 1rem;
        }

        .robot-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 8px; padding: 0.8rem;
            display: flex; flex-direction: column; gap: 0.4rem;
            margin-bottom: 0.5rem;
        }
        
        .robot-header {
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .robot-name { font-weight: 600; font-size: 0.85rem; }
        .robot-status { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 700; }

        .telemetry-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.75rem;
        }
        
        .tel-label { color: var(--dim); }
        .tel-val { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

        .bar-wrap { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; margin-top: 2px; }
        .bar-fill { height: 100%; transition: width 0.3s; }
        
        .status-idle { color: var(--dim); }
        .status-collect { color: var(--accent); }
        .status-unload { color: var(--warning); }
        .status-charge { color: var(--success); }

        /* Custom Slider Styles */
        .control-group {
            display: flex; flex-direction: column; gap: 0.4rem;
            margin-bottom: 0.8rem;
        }
        .control-row {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.8rem;
        }
        input[type=range] {
            width: 100%; background: rgba(255,255,255,0.05);
            border-radius: 2px; height: 4px; outline: none;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }

    </style>
</head>
<body>

    <aside id="left-panel">
        <header>
            <h1>Bag Collector OS</h1>
            <p class="sub">Autonomous Logistics Multi-Agent Simulation</p>
        </header>

        <div>
            <p class="section-label">Kontrol Simulasi</p>
            
            <div class="control-group">
                <div class="control-row">
                    <label>Jumlah Robot</label>
                    <span id="val-robot-count" style="font-size:0.75rem; color:var(--accent);">3</span>
                </div>
                <input type="range" id="param-robot-count" min="3" max="10" step="1" value="3">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label>Stasiun Cas</label>
                    <span id="val-station-count" style="font-size:0.75rem; color:var(--accent);">1</span>
                </div>
                <input type="range" id="param-station-count" min="1" max="2" step="1" value="1">
            </div>

            <div class="control-group">
                <div class="control-row">
                    <label>Kapasitas Maksimal</label>
                    <span id="val-max-load" style="font-size:0.75rem; color:var(--accent);">20</span>
                </div>
                <input type="range" id="param-max-load" min="5" max="50" step="5" value="20">
            </div>
        </div>

        <div style="flex: 1; overflow-y: auto;">
            <p class="section-label">Telemetri Robot</p>
            <div id="telemetry-container">
                <!-- Dynamically Generated -->
            </div>
        </div>

        <div>
            <p class="section-label">Legenda Medan</p>
            <div style="font-size: 0.75rem; color: var(--dim); display: flex; flex-direction: column; gap: 0.4rem;">
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div style="width: 12px; height: 12px; background: rgba(14, 165, 233, 0.2); border: 1px solid var(--accent);"></div>
                    <span>Lane Produksi (Matrix 5x5)</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div style="width: 12px; height: 12px; background: rgba(34, 197, 94, 0.2); border: 1px solid var(--success);"></div>
                    <span>Charging Station</span>
                </div>
                <div style="display: flex; align-items: center; gap: 0.5rem;">
                    <div style="width: 12px; height: 12px; background: rgba(245, 158, 11, 0.2); border: 1px solid var(--warning);"></div>
                    <span>Terminal Unload</span>
                </div>
            </div>
        </div>
    </aside>

    <main id="canvas-wrap">
        <canvas id="sim-canvas"></canvas>
    </main>

    <script type="module" src="simulation.js"></script>
</body>
</html>
