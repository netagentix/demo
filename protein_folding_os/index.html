<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RTDF: Protein Folding</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: 'Outfit', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h2 { margin-top: 20px; font-weight: 600; color: #38bdf8; }
        p { margin: 5px 0 20px 0; color: #94a3b8; max-width: 800px; text-align: center; }
        canvas { 
            background: #1e293b; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        .panel { 
            display: flex; 
            gap: 15px; 
            margin-top: 20px; 
            margin-bottom: 30px;
        }
        button { 
            padding: 10px 20px; 
            background: #334155; 
            color: #f8fafc;
            border: 1px solid #475569; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.2s;
        }
        button:hover {
            background: #475569;
            border-color: #94a3b8;
        }
        button.primary {
            background: #0ea5e9;
            border-color: #38bdf8;
        }
        button.primary:hover {
            background: #0284c7;
        }
    </style>
</head>
<body>
    <h2>Glass Box AI: Protein Folding</h2>
    <p>Protein folding simulation (Amino Acid Chain) using Agentix. No if-else physics; all hydrophobic, ionic, and steric bonds are resolved via equilibrium of Attractors and Repulsors (Semantic Valences).</p>
    
    <canvas id="sim-canvas" width="800" height="450"></canvas>
    
    <div class="panel">
        <button id="btn-toggle" class="primary">Pause Simulation</button>
        <button id="btn-jiggle">Add Heat</button>
        <button id="btn-reset">Reset / Unfold Chain</button>
    </div>
    
    <script type="module" src="simulation.js"></script>
</body>
</html>
